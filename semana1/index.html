<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        /* [He omitido el bloque de CSS largo por espacio, pero debes copiar el bloque <style> de tu original aquí] */
        body { background: #0a0a0f; color: #e8e8f0; font-family: sans-serif; padding: 30px; }
        .back-link { color: #ff4d4d; text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Volver al Menú Principal</a>
    
    <div class="week-panel active" id="panel-1">
        <div class="wk-header">
            <div class="wk-num-badge" style="background:rgba(255,77,77,.12);color:#ff4d4d">01</div>
            <div class="wk-info">
                <div class="wk-eyebrow">Tema 01 · Preparación de datos</div>
                <div class="wk-title">Ingesta y calidad de datos</div>
                <p class="wk-desc">El dato que llega roto arruina todo lo que viene después...</p>
            </div>
        </div>
        </div>

    <script>
        // Función para los tabs internos del laboratorio
        function switchTab(el, labId, tabName) {
            const wrap = el.closest('.lab-wrap');
            wrap.querySelectorAll('.lab-tab').forEach(t => t.classList.remove('active'));
            wrap.querySelectorAll('.lab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const target = document.getElementById(labId + '-' + tabName);
            if (target) target.classList.add('active');
        }
    </script>
</body>
</html>
